[project]
name = "pytd"  
version = "1.0.0"
requires-python = ">=3.13"
authors = [
    {name = "Polecat", email = "polecat@disroot.org"}
]
description = "A simple Python-based CLI todo list."  
readme = "README.md"
license = "MIT"
keywords = ["todo", "cli"]   
dependencies = [
    "tabulate>=0.9.0",
]


# [build-system]


# [project.urls]
# Repository =

[tool.black]
line-length = 88
target-version = ["py313"]   

[tool.ruff]
line-length = 88
extend-select = ["I"]
ignore = ["E501"]

[tool.pyright]
typeCheckingMode = "strict"
reportMissingImports = false
